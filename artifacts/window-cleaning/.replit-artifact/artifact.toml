kind = "web"
previewPath = "/"
title = "Window Cleaning Booking"
version = "1.0.0"
id = "artifacts/window-cleaning"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23738

[services.development]
run = "pnpm --filter @workspace/window-cleaning run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/window-cleaning", "run", "build" ]
publicDir = "artifacts/window-cleaning/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23738"
BASE_PATH = "/"
